<div class="est-layout">
  <aside class="est-sidebar">
    <div class="sidebar__brand">
      <a routerLink="/estudiante/panel" class="sidebar__logo">
        <span class="sidebar__psi" aria-hidden="true">Ψ</span>
        <span class="sidebar__logo-text">Simulador de Decisiones</span>
      </a>
    </div>

    <nav class="sidebar__nav" aria-label="Navegación estudiante">
      <div class="nav-group">
        <div class="nav-group__title">Principal</div>
        <a routerLink="/estudiante/panel" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
          <app-nav-icon name="home" />
          <span>Inicio</span>
        </a>
      </div>
      <div class="nav-group">
        <div class="nav-group__title">Práctica</div>
        <a routerLink="/estudiante/practicas" routerLinkActive="active" class="nav-item">
          <app-nav-icon name="calendar" />
          <span>Mis prácticas</span>
        </a>
      </div>
    </nav>

    <footer class="sidebar__footer">
      <button type="button" class="nav-item nav-item--logout" (click)="cerrarSesion()">
        <app-nav-icon name="logout" />
        <span>Cerrar sesión</span>
      </button>
    </footer>
  </aside>

  <div class="est-main">
    <header class="topbar">
      <div class="topbar__lead">
        <span class="est-topbar-title">{{ titulo() }}</span>
      </div>
      <div class="topbar__actions">
        <div class="profile">
          <span class="profile__avatar">{{ iniciales() }}</span>
          <div class="profile__info">
            <span class="profile__name">{{ estudianteSession.nombreEstudiante() }}</span>
            <span class="profile__role">Estudiante</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <ng-content />
    </main>
  </div>
</div>
