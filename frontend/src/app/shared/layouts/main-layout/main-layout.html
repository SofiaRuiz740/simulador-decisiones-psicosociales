<mat-sidenav-container class="layout-container">

  <mat-sidenav
    #sidenav
    class="sidenav"
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="!(isHandset$ | async)"
    fixedInViewport>

    <div class="sidenav-brand">
      <div class="logo"><mat-icon>psychology</mat-icon></div>
      <div class="brand-text">
        <strong>{{ appName }}</strong>
        <span>Simulador psicosocial</span>
      </div>
    </div>

    <mat-nav-list class="nav-list">
      @for (item of navItems(); track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          (click)="closeIfOverMode()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <mat-toolbar class="topbar">
      @if (isHandset$ | async) {
        <button
          type="button"
          mat-icon-button
          aria-label="Abrir menú"
          (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="app-name">{{ appName }}</span>
      <span class="spacer"></span>

      @if (usuario(); as u) {
        <button
          mat-button
          class="user-btn"
          [matMenuTriggerFor]="userMenu"
          aria-label="Menú de usuario">
          <span class="avatar">{{ iniciales() }}</span>
          <span class="user-name">{{ u.nombre_completo }}</span>
          <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu">
          <div class="menu-header">
            <p class="menu-user">{{ u.nombre_completo }}</p>
            <p class="menu-email">{{ u.email }}</p>
            <p class="menu-rol">{{ u.rol }}</p>
          </div>
          <mat-divider />
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Cerrar sesión</span>
          </button>
        </mat-menu>
      }
    </mat-toolbar>

    <main class="main-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
