# =========================================================
# Stack DESTINO — aislado del proyecto ORIGEN (simulador_narrativo_*)
#
# Uso:
#   docker compose up --build -d
#   docker compose logs -f backend
#   docker compose exec backend python manage.py migrate
#   docker compose exec backend python manage.py createsuperuser
#   docker compose down
# =========================================================

name: simulador-destino

services:

  db:
    image: postgres:16-alpine
    container_name: simulador_destino_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - destino_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simulador_destino_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - destino_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simulador_destino_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    networks:
      - destino_net

volumes:
  # Volúmenes del stack previo (usuarios, casos, prácticas ya configurados).
  postgres_data:
    external: true
    name: simulador_postgres_data
  media_files:
    external: true
    name: simulador_media_files
  static_files:
    external: true
    name: simulador_static_files

networks:
  destino_net:
    name: simulador_destino_net
    driver: bridge
